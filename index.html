<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>ClickHack | Universal Studio</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="ic_launcher.png">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&f[]=geist-mono@400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root { --bg: #09090b; --panel: #121214; --border: #27272a; --ink: #fafafa; --mut: #71717a; --accent: #3b82f6; --radius: 1rem; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Satoshi', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .app { max-width: 900px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100%; padding: 0.5rem; gap: 0.5rem; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0.5rem; flex-shrink: 0; }
        .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.04em; }
        .logo span { color: var(--accent); }
        .btn-group { display: flex; gap: 0.35rem; }
        button { display: flex; align-items: center; justify-content: center; padding: 0.5rem 0.8rem; border-radius: 0.6rem; border: 1px solid var(--border); background: var(--panel); color: var(--ink); cursor: pointer; transition: 0.1s; font-family: inherit; }
        button:active { transform: scale(0.95); background: var(--border); }
        button.primary { background: var(--accent); border-color: var(--accent); }
        .btn-text { font-size: 0.75rem; margin-left: 0.4rem; font-weight: 700; text-transform: uppercase; }
        .controls { display: grid; grid-template-columns: 140px 1fr; gap: 0.5rem; align-items: center; }
        .tabs { display: flex; background: var(--panel); border: 1px solid var(--border); padding: 0.2rem; border-radius: 0.75rem; }
        .tab { flex: 1; padding: 0.4rem; text-align: center; font-size: 0.7rem; font-weight: 800; border-radius: 0.5rem; cursor: pointer; color: var(--mut); }
        .tab.active { background: var(--border); color: var(--ink); }
        .speed-panel { display: flex; align-items: center; gap: 0.75rem; background: var(--panel); border: 1px solid var(--border); padding: 0 0.75rem; height: 32px; border-radius: 0.75rem; }
        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
        .main-view { flex-grow: 1; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; position: relative; }
        textarea, .preview { width: 100%; height: 100%; border: none; background: transparent; color: var(--ink); line-height: 1.6; position: absolute; top: 0; left: 0; }
        textarea { font-family: 'Geist Mono', monospace; font-size: 0.95rem; resize: none; z-index: 10; padding: 1.25rem; }
        .preview { z-index: 5; overflow-y: auto; display: none; background: var(--panel); padding: 1.25rem; }
        .preview.active { display: block; z-index: 20; }
        .preview h1, .preview h2, .preview h3 { color: #fff; margin: 1.5rem 0 1rem 0; }
        .preview p { margin: 0 0 1.2rem 0; color: #e4e4e7; }
        .preview table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; }
        .preview th, .preview td { border: 1px solid #3f3f46; padding: 0.75rem; text-align: left; }
        .preview th { background: #27272a; }
        footer { display: flex; justify-content: space-between; padding: 0.4rem 0.75rem; background: var(--panel); border-radius: 0.75rem; border: 1px solid var(--border); font-size: 0.7rem; color: var(--mut); }
        footer a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--ink); color: #000; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 700; font-size: 0.8rem; z-index: 1000; }
        @media (max-width: 500px) { .btn-text { display: none; } }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="logo">CLICK<span>HACK</span></div>
        <div class="btn-group">
            <button onclick="clearText()"><i class="ph ph-trash"></i></button>
            <button id="btnSpeak" onclick="toggleSpeech()" class="primary"><i class="ph ph-speaker-high"></i><span class="btn-text" data-key="speak">Голос</span></button>
            <button id="btnCopy" class="primary" onclick="copyForDzen()"><i class="ph ph-copy"></i><span class="btn-text" data-key="copy">Копия</span></button>
        </div>
    </header>
    <div class="controls">
        <div class="tabs">
            <div id="tabEditor" class="tab active" onclick="setMode('edit')" data-key="tabEdit">EDIT</div>
            <div id="tabPreview" class="tab" onclick="setMode('view')" data-key="tabView">VIEW</div>
        </div>
        <div class="speed-panel"><i class="ph ph-gauge"></i><input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0"></div>
    </div>
    <main class="main-view">
        <textarea id="editor" spellcheck="false"></textarea>
        <div id="preview" class="preview"></div>
    </main>
    <footer>
        <div id="stats">Chars: 0 | Words: 0</div>
        <div><a href="https://dzen.ru/clickhack" target="_blank" data-key="channel">КликХак на Дзене</a></div>
    </footer>
</div>

<script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const speedInput = document.getElementById('speed');
    let synth = window.speechSynthesis;
    let isSpeaking = false;

    // --- Локализация ---
    const i18n = {
        ru: {
            speak: "Голос", stop: "Стоп", copy: "Копия", tabEdit: "ТЕКСТ", tabView: "ПРЕВЬЮ",
            channel: "КликХак на Дзене", clearMsg: "Очистить?", toastCopy: "Скопировано для Дзена!",
            placeholder: "Начни писать новость здесь..."
        },
        en: {
            speak: "Speak", stop: "Stop", copy: "Copy", tabEdit: "EDIT", tabView: "VIEW",
            channel: "Visit Channel", clearMsg: "Clear all?", toastCopy: "Copied to clipboard!",
            placeholder: "Start typing your news here..."
        }
    };

    const userLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
    document.documentElement.lang = userLang;
    
    function applyLang() {
        const t = i18n[userLang];
        document.querySelectorAll('[data-key]').forEach(el => {
            el.innerText = t[el.getAttribute('data-key')];
        });
        editor.placeholder = t.placeholder;
    }

    marked.setOptions({ gfm: true, breaks: true });

    function update() {
        preview.innerHTML = marked.parse(editor.value);
        document.getElementById('stats').innerText = `Chars: ${editor.value.length} | Words: ${editor.value.trim() ? editor.value.trim().split(/\s+/).length : 0}`;
        localStorage.setItem('kh_universal_draft', editor.value);
    }

    function setMode(mode) {
        if(mode === 'view') { update(); preview.classList.add('active'); document.getElementById('tabPreview').classList.add('active'); document.getElementById('tabEditor').classList.remove('active'); }
        else { preview.classList.remove('active'); document.getElementById('tabEditor').classList.add('active'); document.getElementById('tabPreview').classList.remove('active'); }
    }

    async function copyForDzen() {
        update();
        const clone = preview.cloneNode(true);
        clone.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.insertAdjacentHTML('afterend', cb.checked ? '✅ ' : '⬜ ');
            cb.remove();
        });

        const container = document.createElement('div');
        container.style.cssText = "position:fixed;left:-9999px;opacity:0;white-space:pre-wrap;";
        container.innerHTML = clone.innerHTML;
        document.body.appendChild(container);

        const range = document.createRange();
        range.selectNodeContents(container);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        try {
            document.execCommand('copy');
            showToast(i18n[userLang].toastCopy);
        } catch (err) { showToast('Error'); }

        selection.removeAllRanges();
        document.body.removeChild(container);
    }

    function toggleSpeech() {
        if (isSpeaking) { synth.cancel(); isSpeaking = false; document.getElementById('btnSpeak').querySelector('.btn-text').innerText = i18n[userLang].speak; }
        else {
            if(!editor.value) return;
            const ut = new SpeechSynthesisUtterance(editor.value);
            ut.rate = parseFloat(speedInput.value);
            // Авто-детект языка для голоса
            ut.lang = navigator.language || 'ru-RU';
            
            ut.onend = () => { isSpeaking = false; toggleSpeech(); };
            const voices = synth.getVoices();
            const voice = voices.find(v => v.lang.includes(userLang));
            if(voice) ut.voice = voice;
            
            synth.speak(ut); isSpeaking = true;
            document.getElementById('btnSpeak').querySelector('.btn-text').innerText = i18n[userLang].stop;
        }
    }

    function clearText() { if(confirm(i18n[userLang].clearMsg)) { editor.value = ''; update(); } }
    function showToast(m) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
    
    editor.addEventListener('input', update);
    window.onload = () => { 
        applyLang();
        editor.value = localStorage.getItem('kh_universal_draft') || ''; 
        update();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = () => synth.getVoices();
    };
</script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>КликХак Студия</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&f[]=geist-mono@400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --bg: #09090b; --panel: #121214; --border: #27272a; --ink: #fafafa; --mut: #71717a; --accent: #3b82f6; --radius: 1rem; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Satoshi', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .app { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; height: 100%; padding: 0.5rem; gap: 0.5rem; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; }
        .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.04em; }
        .logo span { color: var(--accent); }
        
        .btn-group { display: flex; gap: 0.4rem; }
        button { display: flex; align-items: center; justify-content: center; padding: 0.6rem 0.8rem; border-radius: 0.75rem; border: 1px solid var(--border); background: var(--panel); color: var(--ink); cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.95); }
        button.primary { background: var(--accent); border-color: var(--accent); font-weight: 700; font-size: 0.8rem; }

        .tabs { display: flex; background: var(--panel); border: 1px solid var(--border); padding: 0.2rem; border-radius: 0.8rem; }
        .tab { flex: 1; padding: 0.5rem; text-align: center; font-size: 0.75rem; font-weight: 800; border-radius: 0.6rem; cursor: pointer; color: var(--mut); }
        .tab.active { background: var(--border); color: var(--ink); }

        .workspace { flex-grow: 1; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; position: relative; }
        textarea, .preview { width: 100%; height: 100%; padding: 1.25rem; border: none; background: transparent; color: var(--ink); line-height: 1.6; position: absolute; top: 0; left: 0; }
        textarea { font-family: 'Geist Mono', monospace; font-size: 0.95rem; resize: none; z-index: 10; }
        .preview { z-index: 5; overflow-y: auto; display: none; background: var(--panel); }
        .preview.active { display: block; z-index: 20; }

        /* Типографика превью */
        .preview h1 { font-size: 1.6rem; margin: 0 0 1rem 0; color: #fff; }
        .preview b { color: var(--accent); }
        .preview a { color: var(--accent); }
        .preview ul { padding-left: 1.2rem; }

        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 700; font-size: 0.8rem; z-index: 1000; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="logo">КЛИК<span>ХАК</span>.IO</div>
        <div class="btn-group">
            <button onclick="clearText()"><i class="ph ph-trash"></i></button>
            <button class="primary" onclick="copyForDzen()"><i class="ph ph-copy"></i>&nbsp;КОПИРОВАТЬ</button>
        </div>
    </header>

    <div class="tabs">
        <div id="tabEditor" class="tab active" onclick="setMode('edit')">РЕДАКТОР</div>
        <div id="tabPreview" class="tab" onclick="setMode('view')">ПРЕВЬЮ</div>
    </div>

    <main class="workspace">
        <textarea id="editor" placeholder="Начни писать новость..."></textarea>
        <div id="preview" class="preview"></div>
    </main>
</div>

<script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    function render(md) {
        if(!md) return '';
        let res = md
            .replace(/^# (.*$)/gm, '<h1>$1</h1>')
            .replace(/^## (.*$)/gm, '<h2>$1</h2>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
            .replace(/^[-*+]\s+(.*)$/gm, '<li>$1</li>');
        
        res = res.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>').replace(/<\/ul>\n?<ul>/g, '');
        return res.replace(/\n/g, '<br>');
    }

    function update() {
        preview.innerHTML = render(editor.value);
        localStorage.setItem('kh_web_draft', editor.value);
    }

    function setMode(mode) {
        if(mode === 'view') {
            update();
            preview.classList.add('active');
            document.getElementById('tabPreview').classList.add('active');
            document.getElementById('tabEditor').classList.remove('active');
        } else {
            preview.classList.remove('active');
            document.getElementById('tabEditor').classList.add('active');
            document.getElementById('tabPreview').classList.remove('active');
        }
    }

    async function copyForDzen() {
        update();
        const html = preview.innerHTML;
        const container = document.createElement('div');
        container.innerHTML = html;
        container.style.position = 'fixed'; container.style.left = '-9999px';
        document.body.appendChild(container);

        const range = document.createRange();
        range.selectNodeContents(container);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        
        document.execCommand('copy');
        document.body.removeChild(container);
        showToast('Готово для Дзена!');
    }

    function clearText() { if(confirm("Очистить?")) { editor.value = ''; update(); } }
    function showToast(m) {
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
        document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
    }

    editor.addEventListener('input', update);
    window.onload = () => { editor.value = localStorage.getItem('kh_web_draft') || ''; update(); };
</script>
</body>
</html>
